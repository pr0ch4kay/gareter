<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Русское искусство XVIII–XX | ПГКГ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #f8f4ee;
      color: #1f1f1f;
    }
    
    .serif {
      font-family: 'Playfair Display', serif;
    }

    .hero-bg {
      background-image: linear-gradient(rgba(0,0,0,0.28), rgba(0,0,0,0.38)), 
                        url('images/aivazovsky-voskhod.jpg');
      background-size: cover;
      background-position: center;
    }

    .art-card {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      background-color: white;
    }
    
    .art-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px -12px rgba(139, 109, 76, 0.2);
    }

    .art-card img {
      transition: transform 0.9s ease;
    }
    
    .art-card:hover img {
      transform: scale(1.09);
    }

    .accent {
      color: #8b6d4c;
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <header class="hero-bg h-screen flex items-center justify-center relative">
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-[#f8f4ee]/30 to-[#f8f4ee]"></div>
    
    <div class="relative z-10 text-center px-6 max-w-5xl mx-auto">
      <h1 class="serif text-6xl md:text-7xl lg:text-8xl font-bold tracking-tighter text-white leading-none mb-6 drop-shadow-xl">
        Русское искусство
      </h1>
      <p class="text-3xl md:text-4xl text-white/95 serif tracking-wide">XVIII — начала XX века</p>
      <p class="mt-10 text-xl text-white/90">Приморская государственная картинная галерея</p>
      
      <button onclick="document.getElementById('gallery-section').scrollIntoView({ behavior: 'smooth' })" 
              class="mt-20 px-14 py-6 bg-white text-[#8b6d4c] font-medium text-lg rounded-2xl hover:bg-amber-50 transition-all shadow-xl">
        Смотреть коллекцию
      </button>
    </div>

    <div class="absolute bottom-12 left-1/2 -translate-x-1/2 text-white/80 animate-bounce">
      <i class="fas fa-chevron-down text-4xl"></i>
    </div>
  </header>

  <!-- Фильтры -->
  <div class="sticky top-0 bg-white/95 backdrop-blur-md border-b border-amber-100 z-50 py-7 shadow">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex flex-col lg:flex-row gap-6 items-center">
        <div class="flex-1 w-full">
          <div class="relative">
            <input 
              type="text" 
              id="searchInput"
              placeholder="Поиск по художнику или названию картины..."
              class="w-full bg-white border border-amber-200 focus:border-[#8b6d4c] rounded-3xl py-5 pl-16 text-lg placeholder-gray-400 focus:outline-none transition-all"
            >
            <i class="fas fa-search absolute left-7 top-1/2 -translate-y-1/2 text-[#8b6d4c] text-2xl"></i>
          </div>
        </div>

        <div class="flex gap-3 flex-wrap">
          <button onclick="filterCategory('all')" class="category-btn active px-8 py-4 bg-[#8b6d4c] text-white font-medium rounded-3xl transition-all">Все работы</button>
          <button onclick="filterCategory('18')" class="category-btn px-8 py-4 bg-white hover:bg-amber-50 border border-amber-200 text-gray-700 rounded-3xl transition-all">XVIII век</button>
          <button onclick="filterCategory('19')" class="category-btn px-8 py-4 bg-white hover:bg-amber-50 border border-amber-200 text-gray-700 rounded-3xl transition-all">XIX век</button>
          <button onclick="filterCategory('20')" class="category-btn px-8 py-4 bg-white hover:bg-amber-50 border border-amber-200 text-gray-700 rounded-3xl transition-all">Начало XX</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Галерея -->
  <section id="gallery-section" class="max-w-7xl mx-auto px-6 py-20">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10" id="artGrid">
      <!-- Заполняется через JavaScript -->
    </div>
  </section>

  <!-- Модальное окно -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-6">
    <div class="modal-content bg-white rounded-3xl max-w-5xl w-full overflow-hidden shadow-2xl">
      <div class="flex justify-end p-6 border-b">
        <button onclick="closeModal()" class="text-4xl text-gray-400 hover:text-gray-700 transition-colors">×</button>
      </div>

      <div class="flex flex-col lg:flex-row">
        <div class="lg:w-3/5 bg-[#f8f4ee] p-10 flex items-center justify-center">
          <img id="modalImage" class="max-h-[78vh] w-auto rounded-2xl shadow-xl" alt="">
        </div>

        <div class="lg:w-2/5 p-12 lg:p-16 text-[#1f1f1f]">
          <h2 id="modalTitle" class="serif text-4xl leading-tight mb-4"></h2>
          <p id="modalAuthor" class="text-3xl accent mb-12"></p>

          <div class="space-y-8">
            <div class="flex gap-12">
              <div>
                <p class="text-xs tracking-widest text-gray-500">ГОД СОЗДАНИЯ</p>
                <p id="modalYear" class="text-xl mt-1 font-medium"></p>
              </div>
              <div>
                <p class="text-xs tracking-widest text-gray-500">ТЕХНИКА</p>
                <p id="modalTechnique" class="text-xl mt-1 font-medium"></p>
              </div>
            </div>
            <div>
              <p class="text-xs tracking-widest text-gray-500">РАЗМЕР</p>
              <p id="modalSize" class="text-xl mt-1 font-medium"></p>
            </div>
          </div>

          <div id="modalDesc" class="mt-14 text-[17px] leading-relaxed text-gray-700">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const artworks = [
      {
        id: 1,
        title: "Портрет князя Д. М. Голицына",
        author: "Ф. С. Рокотов",
        year: "1773",
        technique: "Холст, масло",
        size: "63 × 53 см",
        image: "https://github.com/pr0ch4kay/photo/blob/main/%D0%93%D0%BE%D0%BB%D0%B8%D1%86%D1%8B%D0%BD%D0%B0.jpg?raw=true",
        category: "18",
        description: "Гордостью коллекции является работа худож ника «Портрет князя Д. М. Голицына», 1773 года — это произведение относится к так на-зываемой юношеской серии, к которой при-надлежат портреты А. М. Римского-Корсакова и А. И. Воронцова (ГТГ). Художник создаёт произведение, проникнутое особой поэзий и одухотворённостью. "
      },
      {
        id: 2,
        title: "Портрет неизвестной в сером платье",
        author: "К.-Л.-И. Христинек",
        year: "1772",
        technique: "Холст, масло",
        size: "54 × 45 см",
        image: "https://github.com/pr0ch4kay/photo/blob/main/%D0%92%20%D1%81%D0%B5%D1%80%D0%BE%D0%BC%20%D0%BF%D0%BB%D0%B0%D1%82%D1%8C%D0%B5.jpg?raw=true",
        category: "18",
        description: "К-Л-И.Христинек, немец по национальности, родился и всю жизнь прожил в России. Он первый «русский живописец из немцев». Твор-чество его представлено двумя произведени-ями: «Портретом графа Ф. Г. Орлова», 1768 г. (блестящий образец полупарадного портрета) и камерным «Портретом неизвестной в сером платье», 1772 г. "
      },
      {
        id: 3,
        title: "Портрет графа Ф. Г. Орлова",
        author: "К.-Л.-И. Христинек",
        year: "1768",
        technique: "Холст, масло",
        size: "88,5 × 72 см",
        image: "https://github.com/pr0ch4kay/photo/blob/main/%D0%9E%D1%80%D0%BB%D0%BE%D0%B2.jpg?raw=true",
        category: "18",
        description: "К-Л-И.Христинек, немец по национальности, родился и всю жизнь прожил в России. Он первый «русский живописец из немцев». Твор-чество его представлено двумя произведени-ями: «Портретом графа Ф. Г. Орлова», 1768 г. (блестящий образец полупарадного портрета) и камерным «Портретом неизвестной в сером платье», 1772 г. "
      },
      {
        id: 8,
        title: "Портрет П. С. Рунича",
        author: "В. Л. Боровиковский",
        year: "Около 1798–1801",
        technique: "Холст, масло",
        size: "66,5 × 54,2 см",
        image: "https://github.com/pr0ch4kay/photo/blob/main/%D0%A0%D1%83%D0%BD%D0%B8%D1%87%D0%B0.jpg?raw=true",
        category: "18",
        description: "В. Л.Боровиковский завершил блестящую пле-яду портретистов XVIII века.Для этого стилистического направления харак-терно новое понимание человеческих цен-ностей — «естественный человек» в «есте-ственной среде», в свободном проявлении своих чувств. В «Портрет П.  С.  Рунича»",
      },
      {
        id: 9,
        title: "Портрет митрополита М. Десницкого",
        author: "В. Л. Боровиковский",
        year: "Не ранее 1818",
        technique: "Холст, масло",
        size: "44,5 × 33,5 см",
        image: "https://github.com/pr0ch4kay/photo/blob/main/%D0%94%D0%B5%D1%81%D0%BD%D0%B8%D1%86%D0%BA%D0%B8%D0%B9.jpg?raw=true",
        category: "19",
        description: "В «Портрете митрополита М. Десницкого» В. Л.Бо-ровиковский возвращается к классицизму, вместе с тем, художник не отказывается от привычного для сентиментализма изображения человека на фоне природы.",
      }
    ];

    function renderGallery(arts) {
      const grid = document.getElementById('artGrid');
      grid.innerHTML = '';

      arts.forEach(art => {
        const cardHTML = `
          <div onclick="showModal(${art.id})" class="art-card group cursor-pointer rounded-3xl overflow-hidden shadow-sm">
            <div class="overflow-hidden">
              <img src="${art.image}" class="w-full aspect-[4/3] object-cover" alt="${art.title}">
            </div>
            <div class="p-7">
              <h3 class="serif text-2xl leading-tight mb-3 text-[#1f1f1f] group-hover:text-[#8b6d4c] transition-colors">${art.title}</h3>
              <p class="text-[#8b6d4c] text-lg font-medium">${art.author}</p>
              <p class="text-gray-600 mt-2">${art.year}</p>
            </div>
          </div>
        `;
        grid.innerHTML += cardHTML;
      });
    }

    function showModal(id) {
      const art = artworks.find(a => a.id === id);
      if (!art) return;

      document.getElementById('modalImage').src = art.image;
      document.getElementById('modalTitle').textContent = art.title;
      document.getElementById('modalAuthor').textContent = art.author;
      document.getElementById('modalYear').textContent = art.year;
      document.getElementById('modalTechnique').textContent = art.technique;
      document.getElementById('modalSize').textContent = art.size;
      document.getElementById('modalDesc').textContent = art.description || 'Описание произведения будет добавлено позже.';

      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function filterCategory(cat) {
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('active', 'bg-[#8b6d4c]', 'text-white');
      });

      if (cat === 'all') {
        document.querySelector('button[onclick="filterCategory(\'all\')"]').classList.add('active', 'bg-[#8b6d4c]', 'text-white');
        renderGallery(artworks);
      } else {
        const filtered = artworks.filter(art => art.category === cat);
        renderGallery(filtered);
      }
    }

    // Поиск
    document.getElementById('searchInput').addEventListener('input', function() {
      const term = this.value.toLowerCase().trim();
      const filtered = artworks.filter(art => 
        art.title.toLowerCase().includes(term) || 
        art.author.toLowerCase().includes(term)
      );
      renderGallery(filtered);
    });

    // Запуск страницы
    window.onload = () => {
      renderGallery(artworks);
    };
  </script>
</body>
</html>
